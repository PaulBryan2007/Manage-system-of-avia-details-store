<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>{% block title %}{% endblock %} - Склад запчастей</title>
    <style>
        body { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            min-height: 100vh; 
            padding-top: 20px; 
        }
        .card { 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); 
        }
        .nav-bar { 
            margin-bottom: 20px; 
        }
        .nav-bar a { 
            margin-right: 10px; 
        }
        .table-danger { 
            background-color: #ffcccc !important; 
        }
        .table-success { 
            background-color: #ccffcc !important; 
        }
        .table-light { 
            background-color: #f8f9fa !important; 
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav-bar text-center">
            <a href="/" class="btn btn-outline-light">🏠 Главная</a>
            <a href="/warehouse" class="btn btn-outline-light">📋 Список</a>
            <a href="/grid" class="btn btn-outline-light">🗺️ Карта склада</a>
        </div>
        <div class="card p-4 bg-white">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            
            {% block body %}{% endblock %}
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
